<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edna's Collections - Dress Gallery</title>
    <link rel="icon" href="favicon.jpg" type="image/jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amsterdam+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Edna's Collections</h1>
    </header>
    
    <div class="floating-cart">
        <div class="cart-header">
            <div class="cart-count">
                <span id="selected-count">0</span>
                <span class="cart-label">Selected Items</span>
            </div>
            <div class="total-price" id="total-price">₵0.00</div>
        </div>
        <div class="selected-items" id="selected-items">
            <!-- Selected items will appear here -->
        </div>
        <button id="send-to-whatsapp" disabled>
            <span class="whatsapp-icon">📱</span>
            Send to WhatsApp
        </button>
    </div>

    <main>
        <div class="dress-container" id="dress-container">
            <!-- Dress items will be dynamically loaded here -->
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <div class="footer-section">
                <h3>Contact Us</h3>
                <p>📞 Phone: +233 20 123 4567</p>
                <p>✉️ Email: info@ednascollections.com</p>
            </div>
            
            <div class="footer-section">
                <h3>Location</h3>
                <p>🏢 123 Fashion Street</p>
                <p>📍 Accra, Ghana</p>
                <p>🕒 Mon-Sat: 9am - 8pm</p>
            </div>
            
            <div class="footer-section social-links">
                <h3>Follow Us</h3>
                <div class="social-icons-grid">
                    <div class="social-column">
                        <a href="https://wa.me/233201234567" target="_blank" class="social-icon whatsapp">
                            📱 WhatsApp
                        </a>
                        <a href="https://www.tiktok.com/@ednascollections" target="_blank" class="social-icon tiktok">
                            🎵 TikTok
                        </a>
                    </div>
                    <div class="social-column">
                        <a href="https://www.snapchat.com/ednascollections" target="_blank" class="social-icon snapchat">
                            👻 Snapchat
                        </a>
                        <a href="https://www.instagram.com/ednascollections" target="_blank" class="social-icon instagram">
                            📸 Instagram
                        </a>
                    </div>
                </div>
            </div>
        </div>
       
    </footer>

    <!-- Preview Modal -->
    <div id="preview-modal" class="modal">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div class="preview-video-container">
                    <video id="preview-video" controls autoplay muted loop>
                        <source src="" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
            </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
